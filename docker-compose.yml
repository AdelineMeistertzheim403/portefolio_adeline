services:
  portfolio:
    build: .
    container_name: portfolio-adeline
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.adeline-portfolio-http.rule=Host(`adelinemeistertzheim.fr`) || Host(`www.adelinemeistertzheim.fr`)
      - traefik.http.routers.adeline-portfolio-http.entrypoints=web
      - traefik.http.routers.adeline-portfolio-http.middlewares=adeline-portfolio-https
      - traefik.http.middlewares.adeline-portfolio-https.redirectscheme.scheme=https
      - traefik.http.middlewares.adeline-portfolio-https.redirectscheme.permanent=true
      - traefik.http.routers.adeline-portfolio.rule=Host(`adelinemeistertzheim.fr`) || Host(`www.adelinemeistertzheim.fr`)
      - traefik.http.routers.adeline-portfolio.entrypoints=websecure
      - traefik.http.routers.adeline-portfolio.tls=true
      - traefik.http.routers.adeline-portfolio.tls.certresolver=letsencrypt
      - traefik.http.routers.adeline-portfolio.middlewares=adeline-portfolio-security
      - traefik.http.middlewares.adeline-portfolio-security.headers.stsSeconds=31536000
      - traefik.http.middlewares.adeline-portfolio-security.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.adeline-portfolio-security.headers.stsPreload=true
      - traefik.http.middlewares.adeline-portfolio-security.headers.browserXssFilter=true
      - traefik.http.middlewares.adeline-portfolio-security.headers.contentTypeNosniff=true
      - traefik.http.middlewares.adeline-portfolio-security.headers.frameDeny=true
      - traefik.http.services.adeline-portfolio.loadbalancer.server.port=80
      - traefik.docker.network=web
    networks:
      - web

networks:
  web:
    external: true
